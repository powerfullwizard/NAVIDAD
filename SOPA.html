 <script>
    // Lista de videos MP4
    const videos = [
      "Twisted Sister - I Wanna Rock.mp4",
      "Quiet Riot - Bang Your Head (Metal Health).mp4",
      "Judas Priest - Breaking The Law (Official Music Video).mp4",
      "Rush - Tom Sawyer.mp4",
      "Faust from Phantom of the Paradise.mp4",
      "Paul Williams - Hell of It.mp4",
      "Phantom Of The Paradise - Life At Last (Ray Kennedy).mp4",
      "video8.mp4"
    ];

    let currentVideo = 0;

    const player = document.getElementById("videoPlayer");
    const nextBtn = document.getElementById("nextBtn");

    nextBtn.addEventListener("click", () => {

      // Avanza al siguiente video
      currentVideo++;

      // Si llega al final vuelve al primero
      if (currentVideo >= videos.length) {
        currentVideo = 0;
      }

      // Cambia el video
      player.src = videos[currentVideo];

      // Reproduce automáticamente
      player.play();
    });
  </script>

<script>
function reproducir(id){

    // detener todos
    document.querySelectorAll("audio").forEach(audio=>{
        audio.pause();
        audio.currentTime = 0;
    });

    // reproducir el elegido
    let audio = document.getElementById(id);
    audio.play();
}
</script>

// 2. CONTROL
let escenaActual = 1;

// 3. MOTOR
function cargarEscena(num) {
  const p = escenas[num];

  if (!p) {
    document.getElementById("texto").innerText = "Escena no existe";
    return;
  }

  escenaActual = num;

  // TEXTO
  document.getElementById("texto").innerText = p.texto;

  // MEDIA
  const mediaDiv = document.getElementById("media");
  mediaDiv.innerHTML = "";

  if (p.tipo === "imagen") {
    mediaDiv.innerHTML = `<img src="${p.media}">`;
  }

  if (p.tipo === "video") {
    mediaDiv.innerHTML = `
      <video autoplay loop controls>
        <source src="${p.media}">
      </video>
    `;
  }

  // AUDIO
  if (p.audio) {
    let audio = document.getElementById("audio");

    if (!audio) {
      audio = document.createElement("audio");
      audio.id = "audio";
      document.body.appendChild(audio);
    }

    audio.src = p.audio;
    audio.play();
  }

  // BOTONES
  const opcionesDiv = document.getElementById("opciones");
  opcionesDiv.innerHTML = "";

  p.opciones.forEach(op => {
    const btn = document.createElement("button");
    btn.innerText = op.texto;
    btn.onclick = () => cargarEscena(op.siguiente);
    opcionesDiv.appendChild(btn);
  });
}

// 4. INICIAR

<script>
function detenerTodo(actual = null){

    // Pausar audios
    document.querySelectorAll("audio").forEach(audio => {

        if(audio !== actual){
            audio.pause();
            audio.currentTime = 0;
        }

    });

    // Pausar videos
    document.querySelectorAll("video").forEach(video => {

        if(video !== actual){
            video.pause();
        }

    });
}

// =========================
// ACTIVAR CONTROL AUTOMATICO
// =========================
document.addEventListener("play", function(e){

    detenerTodo(e.target);

}, true);

</script>
